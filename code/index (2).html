<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pulse Chat</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="joinScreen" class="join-screen">
  <div class="jb jb1"></div>
  <div class="jb jb2"></div>
  <div class="jb jb3"></div>
  <div class="join-card">
    <div class="join-logo">
      <div class="pulse-mark"><span></span></div>
      <span class="pulse-word">Pulse</span>
    </div>
    <p class="join-sub">Real-time chat. Instant connection.</p>

    <div class="jform">
      <div class="jfield">
        <label>Your Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Alex" maxlength="24" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="jfield">
        <label>Choose a Room</label>
        <div class="room-btns" id="roomBtns">
          <button class="rb active" data-room="General"># General</button>
          <button class="rb" data-room="Tech"># Tech</button>
          <button class="rb" data-room="Random"># Random</button>
        </div>
      </div>
      <button class="join-btn" id="joinBtn">
        Join Chat
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
      <p class="join-err" id="joinErr"></p>
    </div>
  </div>
</div>

<!-- CHAT APP -->
<div id="chatApp" class="chat-app">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sb-hd">
      <div class="sb-logo">
        <div class="pulse-mark sm"><span></span></div>
        <span class="pulse-word sm">Pulse</span>
      </div>
      <button class="icon-btn" id="sbClose">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="sb-sec">
      <p class="sb-lbl">Rooms</p>
      <div id="roomList" class="sb-rooms"></div>
    </div>

    <div class="sb-sec">
      <p class="sb-lbl">Online <span class="online-n" id="onlineN">0</span></p>
      <div id="userList" class="sb-users"></div>
    </div>
  </aside>

  <div id="sbMask" class="sb-mask"></div>

  <!-- Main -->
  <div class="chat-main">
    <div class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="tb-mid">
        <span class="tb-room" id="tbRoom"># General</span>
        <span class="tb-stat" id="tbStat">Connecting…</span>
      </div>
      <div class="my-av" id="myAv">?</div>
    </div>

    <div class="msgs-wrap" id="msgsWrap">
      <div class="msgs" id="msgs">
        <div class="welcome-chip">👋 Welcome — say hello to the room!</div>
      </div>
    </div>

    <div class="typing-bar" id="typingBar"></div>

    <div class="input-area">
      <textarea id="msgInput" placeholder="Type a message…" maxlength="1000" rows="1"></textarea>
      <button class="send-btn" id="sendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
